<style>
/* ==========================================================================
   CSS VARIABLES & GLOBAL STYLES (complete retention + professional polish)
   ========================================================================== */
:root {
    --primary: #4361ee;
    --secondary: #3a0ca3;
    --primary-glow: rgba(67, 97, 238, 0.4);
    --accent: #f72585;
    --bg-dark: #0a0f1e;
    --card-bg: rgba(18, 28, 45, 0.65);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-light: #f1f5f9;
    --text-dim: #94a3b8;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --shadow-heavy: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { 
    background: radial-gradient(circle at 10% 20%, #1a1f35, #0a0f1e); 
    height: 100vh; display: flex; align-items: center; justify-content: center; 
    overflow: hidden; color: var(--text-light); 
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* ==========================================================================
   LAYOUT & CONTAINERS (complete retention)
   ========================================================================== */
.app-container { 
    width: 98vw; height: 96vh; background: rgba(8, 12, 24, 0.5); 
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-radius: 2rem; box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9), inset 0 0 0 1px var(--glass-border); 
    overflow: hidden; display: flex; flex-direction: column; position: relative;
}

.announcement-bar {
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    color: white; padding: 0.6rem 2rem; font-size: 0.95rem; font-weight: 600;
    display: flex; align-items: center; overflow: hidden; position: relative;
    z-index: 50; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.1);
}
.announcement-icon { margin-right: 1.5rem; z-index: 2; background: inherit; padding-right: 10px; box-shadow: 10px 0 15px rgba(0,0,0,0.2); }
.marquee-container { flex: 1; overflow: hidden; white-space: nowrap; }
.marquee-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
.announcement-bar:hover .marquee-text { animation-play-state: paused; cursor: default; }
@keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

.main-wrapper { display: flex; flex: 1; min-height: 0; overflow: hidden; }

.app-header { 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 1rem 2rem; background: rgba(0, 0, 0, 0.3); 
    border-bottom: 1px solid var(--glass-border); z-index: 10; 
}
.brand { display: flex; align-items: center; gap: 1rem; }
.brand h1 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(145deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.menu-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; color: white; }
.menu-btn:hover { background: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
.header-actions { display: flex; align-items: center; gap: 1rem; }

.role-badge { padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 0.5rem;}
.role-super { background: rgba(247, 37, 133, 0.2); color: var(--accent); border: 1px solid var(--accent); box-shadow: 0 0 10px rgba(247, 37, 133, 0.3); }
.role-admin { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success); }
.role-mod { background: rgba(245, 158, 11, 0.2); color: var(--warning); border: 1px solid var(--warning); }
.role-user { background: rgba(67, 97, 238, 0.2); color: var(--primary); border: 1px solid var(--primary); }

.streak-badge { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 0.4rem; cursor: help; }

.ai-status-badge { background: rgba(16,185,129,0.15); color: var(--success); padding: 0.3rem 0.9rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600; display: flex; align-items: center; gap: 0.4rem; }

.avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
.avatar:hover { border-color: white; transform: scale(1.05); }

.sidebar { 
    width: 260px; background: rgba(8, 12, 24, 0.6); 
    border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; 
    transition: transform 0.3s ease, width 0.3s ease; 
}
.sidebar.hidden { width: 0; transform: translateX(-100%); border: none; }
.nav-menu { list-style: none; padding: 1.5rem 1rem; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }
.nav-item { padding: 1rem 1.2rem; display: flex; align-items: center; gap: 1rem; color: var(--text-dim); cursor: pointer; border-radius: 1rem; transition: all 0.2s; font-weight: 500; font-size: 0.95rem; }
.nav-item i { width: 20px; text-align: center; font-size: 1.1rem; }
.nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.05); color: white; border-left: 3px solid var(--primary); }
.nav-item.active { background: linear-gradient(90deg, rgba(67, 97, 238, 0.15), transparent); }

.main-content { flex: 1; padding: 2.5rem; overflow-y: auto; position: relative; }

.glass-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 1.5rem; padding: 2rem; margin-bottom: 2rem; box-shadow: var(--shadow-heavy); transition: 0.3s; position: relative;}
.section-title { font-size: 1.6rem; font-weight: 600; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
.section-title-left { display: flex; align-items: center; gap: 0.8rem; }
.section-title-left i { color: var(--primary); }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
.stat-box { background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 1.2rem; border: 1px solid rgba(255,255,255,0.03); display: flex; flex-direction: column; gap: 0.5rem; }
.stat-box i { font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; }
.stat-title { color: var(--text-dim); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-size: 2.5rem; font-weight: 800; color: white; }

.data-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
.data-table th { text-align: left; padding: 1rem; color: var(--text-dim); border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 500; }
.data-table td { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.02); vertical-align: middle; }
.data-table tr:hover td { background: rgba(255,255,255,0.02); }

.badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 0.3rem;}
.bg-success { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
.bg-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
.bg-warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }

.input-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
.input-group label { color: var(--text-dim); font-size: 0.9rem; font-weight: 500; }
.form-control { width: 100%; padding: 0.9rem 1.2rem; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; outline: none; transition: 0.2s; font-size: 0.95rem; }
.form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
select.form-control option { background: #1a1f35; color: white; }
textarea.form-control { resize: vertical; min-height: 100px; }

.btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); }
.btn-outline { background: transparent; border: 1px solid var(--text-dim); color: white; box-shadow: none; }
.btn-outline:hover { border-color: white; background: rgba(255,255,255,0.05); transform: translateY(-2px); }
.btn-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); box-shadow: none; }
.btn-danger:hover { background: var(--danger); color: white; box-shadow: 0 5px 15px rgba(239,68,68,0.4); transform: translateY(-2px); }
.btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; border-radius: 8px; }

.welcome-banner { background: linear-gradient(135deg, rgba(67, 97, 238, 0.15), rgba(58, 12, 163, 0.15)); border: 1px solid var(--glass-border); border-radius: 1.5rem; padding: 2.5rem; margin-bottom: 2rem; position: relative; overflow: hidden; }
.welcome-banner::after { content: ''; position: absolute; top: -50%; right: -10%; width: 300px; height: 300px; background: radial-gradient(circle, var(--primary-glow), transparent 70%); border-radius: 50%; opacity: 0.5; }
.user-quick-stats { display: flex; gap: 1rem; margin-top: 1.5rem; position: relative; z-index: 2; flex-wrap: wrap; }
.user-qs-box { background: rgba(0,0,0,0.4); padding: 0.8rem 1.2rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 1rem; }
.user-qs-box i { font-size: 1.5rem; color: var(--primary); }

.feature-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;}
.feature-card { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.2rem; padding: 2rem; text-align: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
.feature-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); transform: scaleX(0); transition: 0.3s; transform-origin: left; }
.feature-card:hover::before { transform: scaleX(1); }
.feature-card:hover { border-color: var(--glass-border); transform: translateY(-5px); background: rgba(67, 97, 238, 0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.feature-card i.app-icon { font-size: 3rem; color: var(--primary); margin-bottom: 1rem; transition: 0.3s; }
.feature-card:hover i.app-icon { transform: scale(1.1); }
.feature-card h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
.pin-btn { position: absolute; top: 15px; right: 15px; font-size: 1.2rem; color: rgba(255,255,255,0.2); transition: 0.3s; z-index: 10; }
.pin-btn:hover { color: var(--warning); transform: scale(1.2); }
.pin-btn.pinned { color: var(--warning); filter: drop-shadow(0 0 8px var(--warning)); }

.star-rating { display: flex; gap: 0.3rem; font-size: 1.5rem; cursor: pointer; color: rgba(255,255,255,0.2); margin-bottom: 1rem; justify-content: center; }
.star-rating i.active, .star-rating i:hover, .star-rating i:hover ~ i { color: var(--warning); text-shadow: 0 0 10px var(--warning); }
.star-rating-display { color: var(--warning); font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.3rem; }

.badge-grid { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
.achievement-badge { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 1rem; padding: 1rem; width: 100px; text-align: center; }
.achievement-badge i { font-size: 2rem; margin-bottom: 0.5rem; color: var(--primary); }
.achievement-badge span { font-size: 0.75rem; font-weight: 600; color: var(--text-dim); }

.editor-wrapper { display: flex; flex-direction: column; height: calc(100vh - 220px); gap: 1rem; }
.editor-header { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 1rem; border: 1px solid var(--glass-border); }
.editor-main { display: flex; gap: 1rem; flex: 1; min-height: 0; }
.code-pane { flex: 1; display: flex; flex-direction: column; background: #282a36; border-radius: 1rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
.code-tabs { display: flex; background: #1e1f29; border-bottom: 1px solid #444; }
.code-tab { padding: 0.8rem 1.5rem; color: #aaa; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
.code-tab.active { color: #fff; border-bottom: 2px solid var(--primary); background: rgba(255,255,255,0.05); }
.CodeMirror { flex: 1; height: 100% !important; font-size: 14px; font-family: 'Fira Code', monospace; }
.preview-pane { flex: 1; background: #fff; border-radius: 1rem; overflow: hidden; border: 1px solid var(--glass-border); display: flex; flex-direction: column; }
iframe.preview-frame { width: 100%; height: 100%; border: none; background: white; }

.chat-layout { display: flex; gap: 1.5rem; height: calc(100vh - 220px); }
.chat-sidebar { width: 300px; display: flex; flex-direction: column; gap: 0.5rem; overflow-y: auto; padding-right: 0.5rem; }
.chat-user-item { padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 1rem; cursor: pointer; border: 1px solid transparent; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
.chat-user-item:hover { background: rgba(255,255,255,0.05); }
.chat-user-item.active { border-color: var(--primary); background: rgba(67, 97, 238, 0.1); }
.chat-main { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); border-radius: 1.5rem; border: 1px solid var(--glass-border); overflow: hidden; }
.chat-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; }
.chat-messages { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
.msg-bubble { max-width: 75%; padding: 1rem 1.2rem; border-radius: 1.2rem; line-height: 1.5; position: relative; font-size: 0.95rem; }
.msg-in { background: rgba(255,255,255,0.08); align-self: flex-start; border-bottom-left-radius: 0.3rem; }
.msg-out { background: linear-gradient(135deg, var(--primary), var(--secondary)); align-self: flex-end; border-bottom-right-radius: 0.3rem; }
.msg-meta { font-size: 0.7rem; opacity: 0.7; margin-bottom: 0.4rem; display: block; }
.chat-input-wrapper { padding: 1rem; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 1rem; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.auth-box { background: var(--card-bg); border: 1px solid var(--glass-border); padding: 3rem; border-radius: 2rem; width: 100%; max-width: 450px; box-shadow: var(--shadow-heavy); position: relative; }
.auth-box h2 { text-align: center; margin-bottom: 2rem; font-size: 2rem; font-weight: 800; }
.auth-link { text-align: center; margin-top: 1.5rem; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
.auth-link:hover { color: white; text-decoration: underline; }

.modal-content { background: var(--card-bg); border: 1px solid var(--glass-border); padding: 2.5rem; border-radius: 2rem; width: 90%; max-width: 550px; box-shadow: var(--shadow-heavy); max-height: 90vh; overflow-y: auto; }
.modal-actions { display: flex; gap: 1rem; margin-top: 2rem; justify-content: flex-end; }

.toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 10000; display: flex; flex-direction: column; gap: 1rem; }
.toast { background: rgba(18, 28, 45, 0.95); border-left: 4px solid var(--primary); padding: 1rem 1.5rem; border-radius: 12px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 0.95rem; animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; display: flex; align-items: center; gap: 0.8rem; }
.toast.error { border-left-color: var(--danger); }
.toast.success { border-left-color: var(--success); }
.toast.warning { border-left-color: var(--warning); }
@keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.lock-timer { font-size: 3.5rem; font-weight: 800; color: var(--danger); text-align: center; margin: 1.5rem 0; font-variant-numeric: tabular-nums; text-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

.review-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; max-height: 300px; overflow-y: auto; }
.review-item { background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); }
.review-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-dim); }

/* Feed & Social Styles */
.feed-container { max-width: 700px; margin: 0 auto; }
.create-post-card { margin-bottom: 2rem; }
.feed-post { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 1.2rem; padding: 1.5rem; margin-bottom: 1.5rem; }
.post-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
.post-avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
.post-meta { flex: 1; }
.post-author { font-weight: 700; font-size: 1rem; display: block; cursor: pointer; }
.post-author:hover { color: var(--primary); text-decoration: underline; }
.post-time { font-size: 0.8rem; color: var(--text-dim); }
.post-content { margin-bottom: 1rem; line-height: 1.6; word-break: break-word; }
.post-actions { display: flex; gap: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 0.8rem; margin-top: 0.8rem; }
.action-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; transition: 0.2s; }
.action-btn:hover { color: var(--primary); }
.action-btn.liked { color: var(--accent); }
.action-btn.liked i { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes pop { 50% { transform: scale(1.4); } }

.comment-section { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05); }
.comment-input-group { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
.comment-list { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.8rem; }
.comment-item { background: rgba(255,255,255,0.03); padding: 0.8rem 1rem; border-radius: 0.8rem; font-size: 0.9rem; }
.comment-author { font-weight: 600; color: var(--primary); font-size: 0.8rem; margin-bottom: 0.2rem; }

.csv-dropzone { border: 2px dashed var(--glass-border); border-radius: 1rem; padding: 2rem; text-align: center; cursor: pointer; transition: 0.2s; background: rgba(0,0,0,0.2); }
.csv-dropzone:hover { border-color: var(--primary); background: rgba(67, 97, 238, 0.05); }

/* RICH TEXT POST STYLES */
.post-toolbar { display: flex; gap: 0.5rem; background: rgba(255,255,255,0.05); padding: 0.5rem; border-radius: 12px; margin-bottom: 0.5rem; }
.post-toolbar button { background: rgba(255,255,255,0.1); border: none; color: white; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
.post-toolbar button:hover { background: var(--primary); }
.post-toolbar button.active { background: var(--primary) !important; color: white; box-shadow: 0 0 10px var(--primary-glow); }
.post-content { white-space: pre-wrap; word-break: break-word; }
#new-post-content:empty::before {
    content: attr(data-placeholder);
    color: var(--text-dim);
    pointer-events: none;
}

/* FULL-SCREEN PREVIEW FOR PUBLIC USERS + NEW FULLSCREEN CHAT SUPPORT */
.fullscreen-preview-overlay {
    position: fixed; inset: 0; background: rgba(10, 15, 30, 0.98); 
    z-index: 99999; display: none; flex-direction: column;

// ==========================================================================
// 4. GAMIFICATION & STREAKS LOGIC (UPGRADED WITH AI REWARD SCORE)
// ==========================================================================
async function processUserGamification(user) {
    const today = new Date().toISOString().split('T')[0];
    let streaks = user.streaks || { current: 0, max: 0, lastLoginDate: '' };
    let badges = user.badges || ['pioneer']; 
    let updated = false;

    if (streaks.lastLoginDate !== today) {
        const yesterdayDate = new Date();
        yesterdayDate.setDate(yesterdayDate.getDate() - 1);
        const yesterdayStr = yesterdayDate.toISOString().split('T')[0];

        if (streaks.lastLoginDate === yesterdayStr) {
            streaks.current += 1;
        } else {
            streaks.current = 1;
        }
        
        if (streaks.current > streaks.max) streaks.max = streaks.current;
        streaks.lastLoginDate = today;
        updated = true;

        if (streaks.current >= 3 && !badges.includes('streak_3')) badges.push('streak_3');
        if (streaks.current >= 7 && !badges.includes('streak_7')) badges.push('streak_7');
        if (streaks.current >= 30 && !badges.includes('streak_30')) badges.push('streak_30');
    }

    let rewardScore = user.aiRewardScore || 100;
    const rewardIncrement = ((streaks.current || 1) * 15) + 25;
    rewardScore = Math.min(9999, rewardScore + rewardIncrement);
    if (rewardScore !== (user.aiRewardScore || 100)) updated = true;

    if (updated) {
        try {
            await update(ref(db, `users/${user.id}`), { streaks, badges, aiRewardScore: rewardScore });
            user.streaks = streaks;
            user.badges = badges;
            user.aiRewardScore = rewardScore;
        } catch(e) { console.error(e); }
    }
    return user;
}

// ==========================================================================
// 5. PROFESSIONAL 10-AI-BEHAVIOUR UNPREDICTABLE SOCIAL REWARD ENGINE (FURTHER UPGRADED)
// ==========================================================================
const AI_BEHAVIOURS = [
    { name: "Chaotic Randomizer", power: 1.0, postsMin: 1, postsMax: 3, likesMin: 1, likesMax: 5, skipChance: 0.25 },
    { name: "Elite Amplifier", power: 2.8, postsMin: 1, postsMax: 2, likesMin: 4, likesMax: 9, skipChance: 0.12 },
    { name: "Streak Synergist", power: 1.6, postsMin: 2, postsMax: 4, likesMin: 2, likesMax: 7, skipChance: 0.18 },
    { name: "Viral Catalyst", power: 2.2, postsMin: 1, postsMax: 5, likesMin: 3, likesMax: 8, skipChance: 0.15 },
    { name: "Momentum Builder", power: 1.4, postsMin: 1, postsMax: 3, likesMin: 1, likesMax: 6, skipChance: 0.20 },
    { name: "Community Harmonizer", power: 1.3, postsMin: 2, postsMax: 3, likesMin: 2, likesMax: 6, skipChance: 0.22 },
    { name: "Trend Accelerator", power: 1.9, postsMin: 1, postsMax: 4, likesMin: 2, likesMax: 7, skipChance: 0.17 },
    { name: "Engagement Optimizer", power: 2.0, postsMin: 1, postsMax: 3, likesMin: 3, likesMax: 8, skipChance: 0.14 },
    { name: "Reward Equilibrium", power: 1.7, postsMin: 2, postsMax: 4, likesMin: 1, likesMax: 5, skipChance: 0.19 },
    { name: "Hyper Boost Protocol", power: 3.1, postsMin: 1, postsMax: 2, likesMin: 5, likesMax: 10, skipChance: 0.10 }
];

function getPostWeight(post, owner, beh) {
    let base = owner ? (owner.aiRewardScore || 100) : 100;
    let weight = Math.pow(base, beh.power);
    if (beh.name.includes("Streak")) weight *= (owner?.streaks?.current || 1) * 2.5;
    if (beh.name.includes("Trend") || beh.name.includes("Viral") || beh.name.includes("Accelerator")) {
        const ageHours = (Date.now() - new Date(post.timestamp).getTime()) / 3600000;
        weight *= Math.max(0.4, Math.exp(-ageHours / 8));
    }
    if (beh.name.includes("Engagement") || beh.name.includes("Optimizer")) {
        weight *= 1 + ((post.likes || []).length / 15);
    }
    return Math.max(1, weight);
}

function weightedSelect(items, beh) {
    if (items.length === 0) return null;
    const weights = items.map(item => {
        const owner = state.users.find(u => u.id === item.userId);
        return getPostWeight(item, owner, beh);
    });
    let total = weights.reduce((a, b) => a + b, 0);
    if (total === 0) return items[Math.floor(Math.random() * items.length)];
    let r = Math.random() * total;
    for (let i = 0; i < items.length; i++) {
        r -= weights[i];
        if (r <= 0) return items[i];
    }
    return items[items.length - 1];
}

async function simulateRandomLikes(behIndex) {
    const beh = AI_BEHAVIOURS[behIndex % AI_BEHAVIOURS.length];
    if (!state.config.aiEngineEnabled || !state.posts.length || !state.users.length) return;

    aiCycleCount++;

    if (Math.random() < beh.skipChance) {
        await logActivity('AI Cycle Skipped', `Behaviour "${beh.name}" • Cycle #${aiCycleCount} (idle phase)`);
        return;
    }

    const allPosts = state.posts.filter(p => !p.deleteRequested);
    const numPostsToLike = Math.floor(Math.random() * (beh.postsMax - beh.postsMin + 1)) + beh.postsMin;

    let candidates = [...allPosts];
    const selectedPosts = [];
    for (let i = 0; i < numPostsToLike && candidates.length > 0; i++) {
        const selected = weightedSelect(candidates, beh);
        if (selected) {
            selectedPosts.push(selected);
            const idx = candidates.indexOf(selected);
            candidates.splice(idx, 1);
        }
    }

    for (const targetPost of selectedPosts) {
        let currentLikes = targetPost.likes || [];
        const potentialLikers = state.users.filter(u => 
            u.id !== targetPost.userId && !currentLikes.includes(u.id)
        );
        if (potentialLikers.length === 0) continue;

        const numToAdd = Math.floor(Math.random() * (beh.likesMax - beh.likesMin + 1)) + beh.likesMin;
        const shuffledLikers = [...potentialLikers].sort(() => Math.random() - 0.5);
        const selectedLikers = shuffledLikers.slice(0, Math.min(numToAdd, potentialLikers.length));

        const updatedLikes = [...new Set([...currentLikes, ...selectedLikers.map(u => u.id)])];

        try {
            await update(ref(db, `posts/${targetPost.id}`), { likes: updatedLikes });
            const ownerReward = state.users.find(u => u.id === targetPost.userId)?.aiRewardScore || 100;
            await logActivity('AI Reward Like', `Behaviour "${beh.name}" • Cycle #${aiCycleCount} • +${numToAdd} likes on post ${targetPost.id} (owner reward score: ${ownerReward})`);
        } catch(e) {}
    }
}

function startLikeSimulation() {
    if (likeSimulationTimeout) clearTimeout(likeSimulationTimeout);
    runLikeCycle();
}

async function runLikeCycle() {
    if (!state.config.aiEngineEnabled) {
        if (likeSimulationTimeout) {
            clearTimeout(likeSimulationTimeout);
            likeSimulationTimeout = null;
        }
        return;
    }
    await simulateRandomLikes(currentAIBehaviourIndex);
    currentAIBehaviourIndex = (currentAIBehaviourIndex + 1) % AI_BEHAVIOURS.length;
    const minMs = (state.config.aiCycleMin || 20) * 1000;
    const maxMs = (state.config.aiCycleMax || 40) * 1000;
    const delay = Math.floor(Math.random() * (maxMs - minMs + 1)) + minMs;
    likeSimulationTimeout = setTimeout(runLikeCycle, delay);
}

function initListeners() {
    onValue(ref(db, 'users'), async snap => { 
        state.users = snap.exists() ? Object.values(snap.val()) : []; 
        
        if (!state.initialLoadDone) {
            const savedUid = localStorage.getItem('fusion_uid');

                    u = await processUserGamification(u);

                    state.currentView = u.role === 'USER' ? 'feed' : 'dashboard';
                } else {
                    localStorage.removeItem('fusion_uid');
                }
            }
            state.initialLoadDone = true;
        }

        if (state.currentUser) {
            const updatedMe = state.users.find(u => u.id === state.currentUser.id);
            if (!updatedMe || updatedMe.suspended) {
                window.handleLogout(true);
                return;

            state.currentUser = updatedMe;
        }
        renderApp();

    onValue(ref(db, 'features'), snap => { state.features = snap.exists() ? Object.values(snap.val()) : []; renderApp(); });
    onValue(ref(db, 'activity'), snap => { state.activity = snap.exists() ? Object.values(snap.val()).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)) : []; renderApp(); });
    onValue(ref(db, 'messages'), snap => {

        renderApp();

    onValue(ref(db, 'config'), snap => {

            document.documentElement.style.setProperty('--secondary', state.config.themeSecondary);

        if (state.config.aiEngineEnabled) {

                aiEngineStarted = true;
                startLikeSimulation();
            }
        } else {
            if (likeSimulationTimeout) {
                clearTimeout(likeSimulationTimeout);
                likeSimulationTimeout = null;
                aiEngineStarted = false;
            }
        }
        renderApp(); 
    });

    onValue(ref(db, 'posts'), snap => {
        const val = snap.val();
        state.posts = val ? Object.entries(val).map(([key, val]) => ({id: key, ...val})).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)) : [];
        renderApp();
    });
}

window.handleLogin = async () => {
    const email = document.getElementById('l-email').value.trim().toLowerCase();
    const pwd = document.getElementById('l-pwd').value.trim();
    if (!email || !pwd) return window.showToast('Please fill all fields', 'error');

    let user = state.users.find(u => u.email === email);
    if (!user) return window.showToast('Invalid credentials', 'error');

    if (user.lockUntil && new Date(user.lockUntil) > new Date()) {
        state.currentUser = user; 
        state.currentView = 'lockedOut';
        return renderApp();
    }

    if (user.password !== pwd) {
        let fails = (user.failedAttempts || 0) + 1;
        let lockTime = null;
        if (fails >= (state.config.maxFails || 4)) {
            lockTime = new Date(Date.now() + 60000).toISOString();
            window.showToast('Account locked due to too many failed attempts.', 'error');
        } else {
            window.showToast(`Incorrect password. Attempts: ${fails}/${state.config.maxFails}`, 'error');
        }
        await update(ref(db, `users/${user.id}`), { failedAttempts: fails, lockUntil: lockTime });
        if (lockTime) { state.currentUser = { ...user, lockUntil: lockTime, failedAttempts: fails }; state.currentView = 'lockedOut'; renderApp(); }
        return;
    }

    if (user.suspended) return window.showToast('Your account is suspended.', 'error');
    
    user.failedAttempts = 0; user.lockUntil = null;
    user = await processUserGamification(user);
    
    state.currentUser = user;
    localStorage.setItem('fusion_uid', user.id); 
    state.currentView = user.role === 'USER' ? 'feed' : 'dashboard';
    
    await logActivity('Login', 'User authenticated successfully');
    window.showToast(`Welcome back, ${user.username}!`, 'success');

    renderApp();
};

    const pwd = document.getElementById('r-pwd').value.trim();

    };

function initRichToolbar() {
    const editor = document.getElementById('new-post-content');
    if (!editor) return;
    const toolbar = editor.parentElement.querySelector('.post-toolbar');
    if (!toolbar) return;
    const buttons = toolbar.querySelectorAll('button[data-command]');

    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            document.execCommand(btn.dataset.command, false, null);
            updateToolbarButtons(editor, buttons);
            editor.focus();
        });
    });

    const update = () => updateToolbarButtons(editor, buttons);
    editor.addEventListener('keyup', update);
    editor.addEventListener('mouseup', update);
    editor.addEventListener('input', update);
    editor.addEventListener('focus', update);
    update();
}

function updateToolbarButtons(editor, buttons) {
    buttons.forEach(btn => {
        const isActive = document.queryCommandState(btn.dataset.command);
        btn.classList.toggle('active', isActive);
    });
}

function setupLockoutTimer() {
    if(state.lockoutInterval) clearInterval(state.lockoutInterval);
    const updateTimer = () => {
        const display = document.getElementById('countdown-display');
        if(!display || !state.currentUser || !state.currentUser.lockUntil) return clearInterval(state.lockoutInterval);
        
        const diff = new Date(state.currentUser.lockUntil) - new Date();
        if(diff <= 0) {
            clearInterval(state.lockoutInterval);
            display.innerText = "00:00";
            display.style.color = "var(--success)";
            window.handleLogout();
            setTimeout(() => window.showToast('Lock expired. You may log in now.', 'success'), 500);
            return;
        }
        const m = Math.floor(diff / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        display.innerText = `${m}:${s}`;
    };
    updateTimer();
    state.lockoutInterval = setInterval(updateTimer, 1000);
}

window.handleCSVFile = (input, type) => {
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        const text = e.target.result;
        await processCSV(text, type);
        window.closeModal();
    };
    reader.readAsText(file);
};

async function processCSV(text, type) {
    const lines = text.split('\n').filter(l => l.trim() !== '');
    let successCount = 0;
    
    if (type === 'users') {
        for (const line of lines) {
            const parts = line.split(',');
            if (parts.length >= 3) {
                const [user, email, pwd] = parts.map(p => p.trim());
                if (!state.users.some(u => u.email === email)) {
                    const newUser = { 
                        id: generateId(), 
                        username: user, 
                        email: email.toLowerCase(), 
                        password: pwd, 
                        role: 'USER', 
                        suspended: false, 
                        failedAttempts: 0, 
                        lockUntil: null, 
                        joinedAt: new Date().toISOString(), 
                        favorites: [], 
                        badges: [], 
                        streaks: { current:1, max:1, lastLoginDate: new Date().toISOString().split('T')[0] },
                        aiRewardScore: 100
                    };
                    await set(ref(db, `users/${newUser.id}`), newUser);
                    successCount++;
                }
            }
        }
        await logActivity('Bulk User Import', `${successCount} users imported`);
        window.showToast(`Imported ${successCount} users.`, 'success');
    } else if (type === 'posts') {
        for (const line of lines) {
            const firstComma = line.indexOf(',');
            if (firstComma > -1) {
                const username = line.substring(0, firstComma).trim();
                const content = line.substring(firstComma + 1).trim();
                
                const user = state.users.find(u => u.username === username);
                if (user) {
                    const newPost = {
                        id: generateId(),
                        userId: user.id,
                        username: user.username,
                        content: content,
                        timestamp: new Date().toISOString(),
                        likes: [],
                        comments: [],
                        deleteRequested: false
                    };
                    await set(ref(db, `posts/${newPost.id}`), newPost);
                    successCount++;
                }
            }
        }
        await logActivity('Bulk Post Import', `${successCount} posts created`);
        window.showToast(`Created ${successCount} posts.`, 'success');
    }
}

    if (state.editor.instance) state.editor.instance.toTextArea();
    el.value = state.editor[state.editor.activeTab];
    state.editor.instance = CodeMirror.fromTextArea(el, { mode: mode, theme: 'dracula', lineNumbers: true, lineWrapping: true });
    state.editor.instance.on('change', () => { state.editor[state.editor.activeTab] = state.editor.instance.getValue(); updateIframePreview(); });

window.saveNewMasterKey = async () => {
    const current = document.getElementById('current-master').value.trim();
    const newKey = document.getElementById('new-master').value.trim();
    const confirmKey = document.getElementById('confirm-master').value.trim();

    if (!current || !newKey || !confirmKey) return window.showToast('All fields are required', 'error');
    if (current !== state.config.masterPasskey) return window.showToast('Current master passkey is incorrect', 'error');
    if (newKey !== confirmKey) return window.showToast('New passkeys do not match', 'error');
    if (newKey.length < 4) return window.showToast('New passkey must be at least 4 characters', 'error');

    window.showConfirm("Confirm Master Passkey Change?", "This will update the master key for all future registrations. This action cannot be undone.", async () => {
        try {
            await update(ref(db, 'config'), { masterPasskey: newKey });
            state.config.masterPasskey = newKey;
            await logActivity('Master Passkey Changed', `New master passkey set`);
            window.showToast('Master passkey updated successfully!', 'success');
            window.closeModal();
        } catch(e) {
            window.showToast('Failed to update master passkey', 'error');
        }
    });
};

window.createPost = async () => {
    const contentEl = document.getElementById('new-post-content');
    let content = contentEl.innerHTML.trim();
    if (!content || content === '<br>' || content === '') return window.showToast('Post content cannot be empty', 'error');
    
    const newPost = {
        id: generateId(),
        userId: state.currentUser.id,
        username: state.currentUser.username,
        content: content,
        timestamp: new Date().toISOString(),
        likes: [],
        comments: [],
        deleteRequested: false
    };
    
    try {
        await set(ref(db, `posts/${newPost.id}`), newPost);
        contentEl.innerHTML = '';
        await logActivity('Post Created', `Rich content posted`);
        window.showToast('Posted successfully', 'success');
    } catch(e) { window.showToast('Failed to post', 'error'); }
};

window.toggleLike = async (postId) => {
    const post = state.posts.find(p => p.id === postId);
    if(!post) return;
    
    let likes = post.likes || [];
    const uid = state.currentUser.id;
    
    if(likes.includes(uid)) {
        likes = likes.filter(id => id !== uid);
    } else {
        likes.push(uid);
    }
    
    try {
        await update(ref(db, `posts/${postId}`), { likes });
        await logActivity('Toggled Like', `Post ID: ${postId}`);
    } catch(e) {}
};

window.adminEditLikes = (postId) => {
    const post = state.posts.find(p => p.id === postId);
    if(!post) return;
    const newCount = prompt("Enter new like count (admin override):", (post.likes || []).length);
    if(newCount !== null) {
        let likes = post.likes || [];
        const target = parseInt(newCount);
        if(isNaN(target)) return;
        
        if(target > likes.length) {
            for(let i=likes.length; i<target; i++) likes.push('admin_adjustment');
        } else {
            likes = likes.slice(0, target);
        }
        
        update(ref(db, `posts/${postId}`), { likes }).then(async () => {
            await logActivity('Admin Overrode Likes', `Post ID: ${postId} set to ${target} likes`);
            window.showToast('Likes updated by admin', 'success');
        });
    }
};

window.toggleComments = (postId) => {
    const el = document.getElementById(`comments-section-${postId}`);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
};

window.postComment = async (postId) => {
    const input = document.getElementById(`comment-input-${postId}`);
    const text = input.value.trim();
    if(!text) return;
    
    const post = state.posts.find(p => p.id === postId);
    const comments = post.comments || [];
    const newComment = {
        id: generateId(),
        username: state.currentUser.username,
        userId: state.currentUser.id,
        text: text,
        timestamp: new Date().toISOString()
    };
    
    comments.push(newComment);
    
    try {
        await update(ref(db, `posts/${postId}`), { comments });
        await logActivity('Posted Comment', `On post ID: ${postId}`);
        input.value = '';
        setTimeout(scrollAllChatBoxes, 80);
    } catch(e) {}
};

window.deleteComment = async (postId, commentId) => {
    const post = state.posts.find(p => p.id === postId);

    const comments = (post.comments || []).filter(c => c.id !== commentId);
    try {
        await update(ref(db, `posts/${postId}`), { comments });
        await logActivity('Deleted Comment', `Comment ID: ${commentId} from post ${postId}`);
    } catch(e) {}
};

    const post = state.posts.find(p => p.id === postId);
    if (!post) return window.showToast('Post not found', 'error');
    let commentsHtml = (post.comments || []).map(c => `
        <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 1rem; margin-bottom: 1rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                <span style="font-weight: 600; color: var(--primary);">${escapeHTML(c.username)}</span>
                <span style="font-size: 0.75rem; color: var(--text-dim);">${new Date(c.timestamp).toLocaleString()}</span>
            </div>
            <div id="c-text-${c.id}" style="margin-bottom: 1rem;">${escapeHTML(c.text)}</div>
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-sm btn-outline" onclick="window.editCommentModal('${postId}', '${c.id}'); event.stopImmediatePropagation();"><i class="fas fa-pen"></i> Edit Comment</button>
                <button class="btn btn-sm btn-danger" onclick="window.deleteComment('${postId}', '${c.id}'); window.managePostComments('${postId}');"><i class="fas fa-trash"></i> Delete</button>
            </div>
        </div>
    `).join('');
    if ((post.comments || []).length === 0) commentsHtml = '<p style="text-align:center; color:var(--text-dim); padding:2rem;">No comments on this post yet.</p>';
    document.getElementById('modal-mount').innerHTML = `
        <div class="overlay">
            <div class="modal-content" style="max-width: 650px;">
                <h2 style="margin-bottom:1.5rem;">Comment Management for Post by ${escapeHTML(post.username)}</h2>
                <div style="max-height: 450px; overflow-y: auto;">
                    ${commentsHtml}
                </div>
                <div class="modal-actions">
                    <button class="btn btn-outline" onclick="window.closeModal()">Close Management</button>
                </div>
            </div>
        </div>
    `;
};

window.editCommentModal = (postId, commentId) => {
    const post = state.posts.find(p => p.id === postId);
    if (!post) return;
    const comment = (post.comments || []).find(c => c.id === commentId);
    if (!comment) return;
    document.getElementById('modal-mount').innerHTML = `
        <div class="overlay">
            <div class="modal-content" style="max-width:450px;">
                <h2>Edit Comment</h2>
                <div class="input-group">
                    <textarea id="edit-comment-text" class="form-control" rows="5">${escapeHTML(comment.text)}</textarea>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-outline" onclick="window.closeModal()">Cancel</button>
                    <button class="btn" onclick="window.saveCommentEdit('${postId}', '${commentId}')">Save Comment Edit</button>
                </div>
            </div>
        </div>
    `;
};

window.saveCommentEdit = async (postId, commentId) => {
    const newText = document.getElementById('edit-comment-text').value.trim();
    if (!newText) {
        window.showToast('Comment text cannot be empty', 'error');
        return;
    }
    const post = state.posts.find(p => p.id === postId);
    if (!post) return;
    const updatedComments = (post.comments || []).map(c => c.id === commentId ? {...c, text: newText} : c);
    try {
        await update(ref(db, `posts/${postId}`), { comments: updatedComments });
        await logActivity('Admin Edited Comment', `Comment ID: ${commentId} in post ${postId}`);
        window.showToast('Comment successfully edited by admin', 'success');
        window.closeModal();
    } catch(e) {
        window.showToast('Failed to update comment', 'error');
    }
};

// ==========================================================================
// USER VIEWS
// ==========================================================================
function renderUserHome() {
    const activeFeats = state.features.filter(f => f.active);
    const u = state.currentUser;
    const favs = u.favorites || [];
    
    const pinnedFeats = activeFeats.filter(f => favs.includes(f.id));
    const unpinnedFeats = activeFeats.filter(f => !favs.includes(f.id));

    const renderCard = (f, isPinned) => {
        const avg = getFeatureAvgRating(f);
        return `
        <div class="feature-card" onclick="window.launchFeature('${f.id}')">
            <i class="fas fa-star pin-btn ${isPinned ? 'pinned' : ''}" onclick="window.toggleFavorite(event, '${f.id}')" title="Pin Feature"></i>
            <i class="fas fa-cube app-icon"></i>
            <h3>${escapeHTML(f.name)}</h3>
            <div class="star-rating-display"><i class="fas fa-star"></i> ${avg > 0 ? avg : 'No ratings yet'}</div>
        </div>`;
    };

    return `
        <div class="welcome-banner">
            <h2 style="font-size:2.5rem; margin-bottom:0.5rem; position:relative; z-index:2;">Welcome back, <strong>${escapeHTML(u.username)}</strong></h2>
            <p style="color:var(--text-light); font-size:1.1rem; position:relative; z-index:2;">Access your personalized applications and maintain peak productivity.</p>
            <div class="user-quick-stats">
                <div class="user-qs-box"><i class="fas fa-fire"></i> <div><div style="font-size:0.8rem; color:var(--text-dim);">Login Streak</div><div style="font-weight:bold;">${u.streaks?.current||0} Days</div></div></div>
                <div class="user-qs-box"><i class="fas fa-medal"></i> <div><div style="font-size:0.8rem; color:var(--text-dim);">Badges Earned</div><div style="font-weight:bold;">${(u.badges||[]).length}</div></div></div>
                <div class="user-qs-box"><i class="fas fa-cubes"></i> <div><div style="font-size:0.8rem; color:var(--text-dim);">Available Apps</div><div style="font-weight:bold;">${activeFeats.length}</div></div></div>
            </div>
        </div>
        
        ${pinnedFeats.length > 0 ? `
            <h3 style="margin-bottom:1.5rem; font-weight:600; display:flex; align-items:center; gap:0.5rem;"><i class="fas fa-thumbtack" style="color:var(--warning);"></i> Pinned Applications</h3>
            <div class="feature-grid">${pinnedFeats.map(f => renderCard(f, true)).join('')}</div>
            <h3 style="margin-bottom:1.5rem; font-weight:600; display:flex; align-items:center; gap:0.5rem; margin-top:1rem;"><i class="fas fa-layer-group" style="color:var(--primary);"></i> All Applications</h3>
        ` : `
            <h3 style="margin-bottom:1.5rem; font-weight:600; display:flex; align-items:center; gap:0.5rem;"><i class="fas fa-layer-group" style="color:var(--primary);"></i> System Applications</h3>
        `}
        
        <div class="feature-grid">
            ${unpinnedFeats.map(f => renderCard(f, false)).join('')}
            ${activeFeats.length === 0 ? '<div style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-dim); background:rgba(0,0,0,0.2); border-radius:1.5rem;">No applications are currently deployed.</div>' : ''}
        </div>
    `;
}
window.toggleFavorite = async (e, id) => {
    e.stopPropagation();
    let favs = state.currentUser.favorites || [];
    if(favs.includes(id)) favs = favs.filter(x => x !== id);
    else favs.push(id);
    try { 
        await update(ref(db, `users/${state.currentUser.id}`), { favorites: favs }); 
        await logActivity('Toggled Favorite', `Feature ID: ${id}`);
    } catch(e) {}
};
window.launchFeature = (id) => {
    const f = state.features.find(x => x.id === id);
    if (!f) return;
    state.viewFeature = f;
    
    if (state.currentUser.role === 'USER') {
        document.getElementById('fullscreen-preview').style.display = 'flex';
        const iframe = document.getElementById('fullscreen-iframe');
        const nameEl = document.getElementById('preview-feature-name');
        nameEl.textContent = f.name;
        
        iframe.srcdoc = `<!DOCTYPE html><html><head><style>body{margin:0;font-family:'Inter',sans-serif;} ${f.css}</style></head><body>${f.html}<script>${f.js}<\/script></body></html>`;
        iframe.style.opacity = '0';
        setTimeout(() => { iframe.style.transition = 'opacity 0.6s'; iframe.style.opacity = '1'; }, 100);
    } else {
        window.navigate('viewFeature');
    }
};

window.exitFullscreenPreview = () => {
    const overlay = document.getElementById('fullscreen-preview');
    overlay.style.display = 'none';
    const iframe = document.getElementById('fullscreen-iframe');
    iframe.srcdoc = '';
};

window.toggleBrowserFullscreen = () => {
    const iframe = document.getElementById('fullscreen-iframe');
    if (!document.fullscreenElement) {
        iframe.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen();
    }
};

function renderUserFeature() {
    if(!state.viewFeature) { window.navigate('apps'); return ''; }
    const f = state.viewFeature;
    return `
        <div class="section-title">
            <div class="section-title-left">
                <button class="btn btn-outline btn-sm" style="margin-right:1rem;" onclick="window.navigate('apps')"><i class="fas fa-arrow-left"></i> Hub</button>
                <i class="fas fa-cube"></i> ${escapeHTML(f.name)}
            </div>
            <button class="btn btn-sm btn-outline" style="border-color:var(--warning); color:var(--warning);" onclick="window.openReviewModal('${f.id}')"><i class="fas fa-star"></i> Rate App</button>
        </div>
        <div class="glass-card" style="padding:0; height:calc(100vh - 200px); overflow:hidden; background:white;">
            <iframe class="preview-frame" srcdoc="<!DOCTYPE html><html><head><style>body{margin:0; font-family:'Inter',sans-serif;} ${f.css}</style></head><body>${f.html}<script>${f.js}<\/script></body></html>"></iframe>
        </div>
    `;
}

window.openReviewModal = (id) => { 
    state.tempRating = 5;
    document.getElementById('modal-mount').innerHTML = `
        <div class="overlay">
            <div class="modal-content" style="text-align:center;">
                <h2 style="margin-bottom:1rem;">Rate this Application</h2>
                <input type="hidden" id="current-rating" value="5">
                <div class="star-rating" id="star-container">
                    ${[1,2,3,4,5].map(n => `<i class="fas fa-star active" onclick="window.setRatingFromModal(${n})" onmouseover="window.hoverRating(${n})" onmouseout="window.hoverRatingFromInput()"></i>`).join('')}
                </div>
                <div class="input-group" style="text-align:left; margin-top:1.5rem;">
                    <label>Leave a comment (Optional)</label>
                    <textarea id="rev-comment" class="form-control" placeholder="What do you think about this feature?"></textarea>
                </div>
                <div class="modal-actions" style="justify-content:center;">
                    <button class="btn btn-outline" onclick="window.closeModal()">Cancel</button>
                    <button class="btn" onclick="window.submitReview('${id}')">Submit Review</button>
                </div>
            </div>
        </div>
    `;
};

window.setRatingFromModal = (val) => {
    document.getElementById('current-rating').value = val;
    window.hoverRating(val);
};

window.hoverRatingFromInput = () => {
    const val = parseInt(document.getElementById('current-rating').value) || 5;
    window.hoverRating(val);
};

window.hoverRating = (val) => {
    const stars = document.getElementById('star-container')?.children;
    if (!stars) return;
    for(let i=0; i<5; i++) { 
        if(i < val) stars[i].classList.add('active'); 
        else stars[i].classList.remove('active'); 
    }
};

window.submitReview = async (id) => {
    const rating = parseInt(document.getElementById('current-rating').value) || 5;
    const comment = document.getElementById('rev-comment').value.trim();
    const rev = { rating, comment, timestamp: new Date().toISOString(), username: state.currentUser.username };
    try {
        await set(ref(db, `features/${id}/reviews/${state.currentUser.id}`), rev);
        await logActivity('Submitted Review', `For feature ID: ${id}`);
        window.showToast('Thank you for your feedback!', 'success');
        window.closeModal();
    } catch(e) { window.showToast('Error saving review', 'error'); }
};

function renderUserChat() {
    const myEmail = state.currentUser.email;
    const myMsgs = state.messages.filter(m => m.from === myEmail || m.to === myEmail);
    
    return `
        <div class="section-title-left"><i class="fas fa-headset" style="color:var(--primary); font-size:1.6rem; margin-right:0.5rem;"></i> <h2 style="font-size:1.6rem; font-weight:600;">Support Center</h2></div>
        <div style="margin-bottom:1.5rem;"></div>
        <div class="chat-main" style="max-width:800px; margin:0 auto; height:calc(100vh - 200px);">
            <div class="chat-header">Direct Line to Administration 
                <button onclick="window.enterChatFullscreen()" class="btn btn-outline btn-sm" style="float:right;"><i class="fas fa-expand"></i> Fullscreen</button>
            </div>
            <div class="chat-messages" id="chat-box">
                ${myMsgs.map(m => `
                    <div class="msg-bubble ${m.from === myEmail ? 'msg-out' : 'msg-in'}">
                        <span class="msg-meta">${m.from === myEmail ? 'You' : 'Support'} • ${new Date(m.timestamp).toLocaleTimeString()}</span>
                        ${escapeHTML(m.text)}
                    </div>
                `).join('')}
            </div>
            <div class="chat-input-wrapper">
                <input type="text" id="user-chat-input" class="form-control" placeholder="Type your message..." onkeypress="if(event.key==='Enter') window.sendUserMsg()">
                <button class="btn" onclick="window.sendUserMsg()"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </div>
    `;
}

function renderProfile() {
    const u = state.currentUser;
    const badgesDict = { 'pioneer': { icon: 'fa-rocket', name: 'Pioneer' }, 'streak_3': { icon: 'fa-fire', name: '3-Day Streak' }, 'streak_7': { icon: 'fa-fire-alt', name: '7-Day Streak' }, 'streak_30': { icon: 'fa-sun', name: '30-Day Streak' } };
    
    const userPosts = state.posts.filter(p => p.userId === u.id);
    
    return `
        <div class="section-title-left"><i class="fas fa-id-badge" style="color:var(--primary); font-size:1.6rem; margin-right:0.5rem;"></i> <h2 style="font-size:1.6rem; font-weight:600;">Personal Profile</h2></div>
        <div style="margin-bottom:1.5rem;"></div>
        <div class="glass-card" style="max-width:800px;">
            <div style="display:flex; align-items:center; gap:2rem; margin-bottom:2.5rem;">
                <div style="width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg, var(--primary), var(--secondary)); display:flex; align-items:center; justify-content:center; font-size:3.5rem; font-weight:bold; color:white; box-shadow:0 10px 25px var(--primary-glow);">
                    ${u.username?.charAt(0).toUpperCase() || ''}
                </div>
                <div>
                    <h2 style="font-size:2rem; font-weight:800; margin-bottom:0.5rem;">${escapeHTML(u.username)}</h2>
                    <span class="badge ${u.role==='USER' ? 'bg-success' : 'bg-warning'}">${(u.role || '').replace('_', ' ')}</span>
                </div>
            </div>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
                <div class="input-group"><label>Email Address</label><input type="text" class="form-control" value="${escapeHTML(u.email)}" readonly style="background:rgba(0,0,0,0.5); opacity:0.7;"></div>
                <div class="input-group"><label>Account Initiated</label><input type="text" class="form-control" value="${new Date(u.joinedAt).toLocaleString()}" readonly style="background:rgba(0,0,0,0.5); opacity:0.7;"></div>
                <div class="input-group"><label>Total Posts</label><input type="text" class="form-control" value="${userPosts.length}" readonly style="background:rgba(0,0,0,0.5); opacity:0.7;"></div>
                <div class="input-group"><label>Total Likes Received</label><input type="text" class="form-control" value="${userPosts.reduce((acc, curr) => acc + (curr.likes?.length||0), 0)}" readonly style="background:rgba(0,0,0,0.5); opacity:0.7;"></div>
                <div class="input-group"><label>AI Reward Score (Like Potential)</label><input type="text" class="form-control" value="${u.aiRewardScore || 100}" readonly style="background:rgba(0,0,0,0.5); opacity:0.7; color:var(--accent); font-weight:700;"></div>
            </div>

            <h3 style="margin-top:2rem; margin-bottom:1rem; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:0.5rem;"><i class="fas fa-trophy" style="color:var(--warning);"></i> Achievements & Gamification</h3>
            <p style="color:var(--text-dim); font-size:0.9rem;">Log in daily to maintain your streak and unlock exclusive badges!</p>
            <div style="display:flex; gap:2rem; margin-top:1rem;">
                <div><label style="color:var(--text-dim); font-size:0.8rem;">Current Streak</label><div style="font-size:1.5rem; font-weight:bold; color:var(--warning);"><i class="fas fa-fire"></i> ${u.streaks?.current||0}</div></div>
                <div><label style="color:var(--text-dim); font-size:0.8rem;">Highest Streak</label><div style="font-size:1.5rem; font-weight:bold; color:white;"><i class="fas fa-crown"></i> ${u.streaks?.max||0}</div></div>
            </div>
            <div class="badge-grid">
                ${(u.badges||[]).map(b => `<div class="achievement-badge"><i class="fas ${badgesDict[b]?.icon || 'fa-medal'}"></i><span>${badgesDict[b]?.name || 'Badge'}</span></div>`).join('')}
            </div>
            
            <div style="margin-top:3rem; border-top:1px solid rgba(255,255,255,0.1); padding-top:2rem;">
                <h3 style="color:var(--danger); margin-bottom:1rem; font-size:1.1rem;">Session Management</h3>
                <button class="btn btn-outline" style="color:var(--danger); border-color:var(--danger);" onclick="window.handleLogout()"><i class="fas fa-sign-out-alt"></i> Terminate Local Session</button>
            </div>
        </div>
    `;
}

initListeners();

setTimeout(() => {

        aiEngineStarted = true;
        startLikeSimulation();
        console.log('%c🚀 AI Like Cycle fully activated in background mode (zero-login persistent)', 'color:#10b981; font-weight:bold; font-size:13px');
    }
}, 1200);
